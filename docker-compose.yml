version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ams-postgres
    environment:
      POSTGRES_DB: asset_management
      POSTGRES_USER: ams_user
      POSTGRES_PASSWORD: ams_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams_user -d asset_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ams-web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ams_user:ams_password@db:5432/asset_management
      - JWT_SECRET_KEY=supersecretjwtkeyforinternshipproject123456!
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - STALE_ASSET_DAYS=30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
